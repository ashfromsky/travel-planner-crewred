name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"
  AIC_BASE_URL: "https://api.artic.edu/api/v1"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - run: uv sync

      - run: uv run python -c "import main"
